name: Pages

on:
  push:
    branches: ["main"]
    paths:
      - "site/**"
      - "docs/agent-setup.md"
      - "docs/assets/margent-app.png"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy landing page
    if: github.repository == 'Brehove/margent'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Prepare static site
        run: |
          mkdir -p _site/assets
          cp -R site/. _site/
          cp docs/assets/margent-app.png _site/assets/margent-app.png

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
