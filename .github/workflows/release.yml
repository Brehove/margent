name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  release-macos:
    name: Build, sign, notarize, and publish
    runs-on: macos-latest
    timeout-minutes: 90

    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', inputs.version) }}
      CLI_ARCHIVE: margent-cli-aarch64-apple-darwin.tar.gz
      MAC_DMG: Margent.dmg

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build CLI archive
        run: |
          cargo build --manifest-path cli/Cargo.toml --release --locked
          mkdir -p dist/cli
          cp cli/target/release/margent dist/cli/margent
          tar -czf "$CLI_ARCHIVE" -C dist/cli margent
          shasum -a 256 "$CLI_ARCHIVE" > "$CLI_ARCHIVE.sha256"

      - name: Build signed desktop release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Margent ${{ env.RELEASE_TAG }}"
          releaseBody: "Desktop app bundles, updater metadata, and CLI archive for ${{ env.RELEASE_TAG }}."
          releaseDraft: false
          prerelease: false

      - name: Upload stable Mac download asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dmg_path="$(find src-tauri/target/release/bundle/dmg -name '*.dmg' -print -quit)"
          if [ -z "$dmg_path" ]; then
            echo "No signed dmg found under src-tauri/target/release/bundle/dmg" >&2
            exit 1
          fi
          cp "$dmg_path" "$MAC_DMG"
          shasum -a 256 "$MAC_DMG" > "$MAC_DMG.sha256"
          gh release upload "$RELEASE_TAG" "$MAC_DMG" "$MAC_DMG.sha256" --clobber

      - name: Upload CLI archive to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" "$CLI_ARCHIVE" "$CLI_ARCHIVE.sha256" --clobber
